<!DOCTYPE html>
<html lang="sr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${kategorija.id == null} ? 'Nova kategorija' : 'Izmena kategorije'">Forma</title>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main>
    <h2 th:text="${kategorija.id == null} ? 'Dodaj novu kategoriju' : 'Izmeni kategoriju'"></h2>

    <form th:action="@{/kategorije/sacuvaj}" th:object="${kategorija}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label for="naziv">Naziv</label>
            <input type="text" id="naziv" th:field="*{naziv}" required>
        </div>

        <div class="form-group">
            <label for="opis">Opis</label>
            <input type="text" id="opis" th:field="*{opis}">
        </div>

        <button type="submit" class="btn btn-primary">Sacuvaj</button>
        <a th:href="@{/kategorije}" class="btn">Otkazi</a>
    </form>
</main>
</body>
</html>
