<!DOCTYPE html>
<html lang="sr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${rezervacija.id == null} ? 'Nova rezervacija' : 'Izmena rezervacije'">Forma</title>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main>
    <h2 th:text="${rezervacija.id == null} ? 'Dodaj novu rezervaciju' : 'Izmeni rezervaciju'"></h2>

    <form th:action="@{/rezervacije/sacuvaj}" th:object="${rezervacija}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label for="voziloId">Vozilo</label>
            <select id="voziloId" name="voziloId" required>
                <option th:each="v : ${vozila}" th:value="${v.id}"
                        th:text="${v.model} + ' (' + ${v.registracija} + ')'"
                        th:selected="${rezervacija.vozilo != null and rezervacija.vozilo.id == v.id}"></option>
            </select>
        </div>

        <div class="form-group">
            <label for="klijentId">Klijent</label>
            <select id="klijentId" name="klijentId" required>
                <option th:each="k : ${klijenti}" th:value="${k.id}"
                        th:text="${k.ime} + ' ' + ${k.prezime}"
                        th:selected="${rezervacija.klijent != null and rezervacija.klijent.id == k.id}"></option>
            </select>
        </div>

        <div class="form-group">
            <label for="datumOd">Datum od</label>
            <input type="date" id="datumOd" th:field="*{datumOd}" required>
        </div>

        <div class="form-group">
            <label for="datumDo">Datum do</label>
            <input type="date" id="datumDo" th:field="*{datumDo}" required>
        </div>

        <div class="form-group">
            <label for="ukupnaCena">Ukupna cena</label>
            <input type="number" step="0.01" id="ukupnaCena" th:field="*{ukupnaCena}" required>
        </div>

        <button type="submit" class="btn btn-primary">Sacuvaj</button>
        <a th:href="@{/rezervacije}" class="btn">Otkazi</a>
    </form>
</main>
</body>
</html>
