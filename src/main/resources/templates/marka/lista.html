<!DOCTYPE html>
<html lang="sr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Marke — AutoNaj</title>
    <link th:replace="~{fragments/header :: css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main>
    <h2>Marke</h2>
    <a th:href="@{/marke/novo}" class="btn btn-primary">Dodaj novu marku</a>

    <table>
        <thead>
        <tr>
            <th>Naziv</th>
            <th>Akcije</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="marka : ${marke}">
            <td th:text="${marka.naziv}"></td>
            <td>
                <a th:href="@{/marke/izmeni/{id}(id=${marka.id})}" class="btn btn-edit">Izmeni</a>
                <a th:href="@{/marke/obrisi/{id}(id=${marka.id})}" class="btn btn-delete"
                   onclick="return confirm('Obrisati marku?')">Obrisi</a>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
