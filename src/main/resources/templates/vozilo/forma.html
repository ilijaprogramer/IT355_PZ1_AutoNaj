<!DOCTYPE html>
<html lang="sr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${vozilo.id == null} ? 'Novo vozilo' : 'Izmena vozila'">Forma</title>
    <link th:replace="~{fragments/header :: css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main>
    <h2 th:text="${vozilo.id == null} ? 'Dodaj novo vozilo' : 'Izmeni vozilo'"></h2>

    <form th:action="@{/vozila/sacuvaj}" th:object="${vozilo}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label for="model">Model</label>
            <input type="text" id="model" th:field="*{model}" required>
        </div>

        <div class="form-group">
            <label for="registracija">Registracija</label>
            <input type="text" id="registracija" th:field="*{registracija}" required>
        </div>

        <div class="form-group">
            <label for="cenaPoDanu">Cena po danu</label>
            <input type="number" step="0.01" id="cenaPoDanu" th:field="*{cenaPoDanu}" required>
        </div>

        <div class="form-group form-check">
            <input type="checkbox" id="dostupno" th:field="*{dostupno}">
            <label for="dostupno">Dostupno</label>
        </div>

        <div class="form-group">
            <label for="markaId">Marka</label>
            <select id="markaId" name="markaId" required>
                <option th:each="m : ${marke}" th:value="${m.id}" th:text="${m.naziv}"
                        th:selected="${vozilo.marka != null and vozilo.marka.id == m.id}"></option>
            </select>
        </div>

        <div class="form-group">
            <label for="kategorijaId">Kategorija</label>
            <select id="kategorijaId" name="kategorijaId" required>
                <option th:each="k : ${kategorije}" th:value="${k.id}" th:text="${k.naziv}"
                        th:selected="${vozilo.kategorija != null and vozilo.kategorija.id == k.id}"></option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Sacuvaj</button>
        <a th:href="@{/vozila}" class="btn">Otkazi</a>
    </form>
</main>
</body>
</html>
